## Review Tone
Flag issues with specific, actionable feedback. Kernel memory safety issues (buffer overflows,
use-after-free, race conditions) are CRITICAL and must be caught. NPU/GPU shared-state bugs
(PSP, SMU, IOMMU) are also CRITICAL — they can crash the entire system. The 7 compiler bug fixes
are specific-to-this-project — any regression in those is a hard block. INT8 DMA stride fix
proposals should be examined carefully. Minor coding style preferences can be noted but not blocked on.
"""

