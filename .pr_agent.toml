## Build System (Makefile)

```makefile
CC       := g++
CFLAGS   := -std=gnu++17 -O2 -I/usr/include/libdrm
LDFLAGS  := -ldrm -ldrm_amdgpu
TEST_SRCS := tests/test_gtt_dmabuf.cpp tests/bench_gtt_dmabuf.cpp tests/test_npu_dev.cpp
```

- `make` — builds all test binaries to build/ directory
- `make test` — runs hardware tests (requires NPU hardware): test_npu_dev, test_gtt_dmabuf, hip_list_devices
- `make bench` — runs benchmarks: bench_gtt_dmabuf, bench_unified.py, stress_npu.py
- `make daemon` — starts flm serve backend + npu-gpu-cpud.py gateway
- `make install` — copies binaries to /usr/local/bin
- ROOT IS NOT NEEDED for building, but needed for running HW tests (sudo)
- Builds: test_gtt_dmabuf, bench_gtt_dmabuf, test_npu_dev
- Does NOT build: test_npu_gemm, test_xrt_npu, test_direct_npu_gemm, test_prepacked_gemm (they need XRT/flm)
- libhip_npu.so built separately via cmake -S rocm-npu

## HIP NPU Shim (rocm-npu/)

### hip_npu.cpp (LD_PRELOAD interception library)
Intercepts 2 functions:
```c
hipError_t hipGetDeviceCount(int *count) {
    // Calls real hipGetDeviceCount via dlsym(RTLD_NEXT, ...)
    // Opens /dev/accel/accel0 — if exists, adds 1 to GPU count
    // NPU is always the last device
}
hipError_t hipGetDeviceProperties(hipDeviceProp_t *props, int deviceId) {
    // Caches real GPU count on first call
    // If deviceId >= g_real_gpu_count, returns NPU properties:
    //   name="AMD XDNA 2 NPU (aie2)"
    //   gcnArchName="aie2"
    //   major=2, minor=0
    //   totalGlobalMem=128 GB
    //   multiProcessorCount=8
    //   integrated=1, canMapHostMemory=1
    //   warpSize=1, maxThreadsPerBlock=1
    // Otherwise delegates to real hipGetDeviceProperties
}
```
Usage: `LD_PRELOAD=libhip_npu.so your_hip_app`

### hip_npu_memory.cpp (NPU memory management)
```c
struct NPUBuffer {
    void     *cpu_ptr;     // CPU mmap of dma-buf
    int      dmabuf_fd;   // dma-buf fd
    size_t   size;
    amdgpu_bo_handle bo;  // amdgpu BO
};
static std::map<void*, NPUBuffer> g_buffers;
```
- ensure_amdgpu(): opens /dev/dri/renderD128, initializes amdgpu_device
- npu_malloc(): allocates GTT BO via amdgpu_bo_alloc(AMDGPU_GEM_DOMAIN_GTT), CPU maps it
- npu_free(): CPU unmap + amdgpu_bo_free
- npu_memcpy H2D/D2H: memcpy on CPU pointer (GTT is CPU-accessible)
- npu_export_dmabuf(): amdgpu_bo_export(amdgpu_bo_handle, dma-buf fd)
- Zero-copy path: GPU BDW writes to GTT BO -> NPU imports via dma-buf
- Thread-safe: std::mutex g_buf_mutex + std::map tracking

### npu_aql.h (AQL packet definitions)
Reverse-engineered from amdxdna's aie2_msg_priv.h message opcodes:
```c
enum npu_opcode {
    NPU_OP_NOP             = 0x0,
    NPU_OP_CREATE_CONTEXT  = 0x2,
    NPU_OP_DESTROY_CONTEXT = 0x3,
    NPU_OP_GET_TELEMETRY   = 0x4,
    NPU_OP_SYNC_BO         = 0x7,
    NPU_OP_EXECUTE_BUFFER  = 0xC,
    NPU_OP_QUERY_STATUS    = 0xD,
    NPU_OP_EXEC_DPU        = 0x10,
    NPU_OP_CONFIG_CU       = 0x11,
    NPU_OP_CHAIN_EXEC_BUFFER = 0x12,
    NPU_OP_CHAIN_EXEC_DPU    = 0x13,
    NPU_OP_CHAIN_EXEC_NPU    = 0x18,
};

struct npu_aql_header (16 bytes packed):
  total_size:11, reserved:5, protocol:8, _pad:8, id:32, opcode:32

struct npu_aql_exec: header + cmd_addr:64, cmd_size:64, completion_signal_addr:64

struct npu_aql_create_ctx: header + pasid:32, num_cols:32, priority:32, _pad:32

struct npu_aql_status: status_code:32, _pad[3]
```

## Kernel Patches (patches/)

### amdgpu_npu.c — NPU IP Block (the main unification patch)
```
struct amdgpu_npu {
    struct pci_dev     *pdev;      // NPU PCI function
    const struct firmware *fw;     // FW image
    char               fw_path[64]; // FW path
    void __iomem       *sram_base; // SRAM BAR
    void __iomem       *mbox_base; // Mailbox BAR
    void __iomem       *psp_regs[4];
    void __iomem       *smu_regs[5];
    struct xdna_mailbox *mbox;     // Firmware interface
    struct xdna_mailbox_channel *mgmt_chann;
    enum { NPU_UNINIT, NPU_STARTED, NPU_STOPPED } status;
    struct amdgpu_ring ring;       // Command submission ring
    struct iommu_domain *domain;   // IOMMU SVA
    int pasid;
};
```
Lifecycle: early_init -> sw_init -> hw_init -> ... -> hw_fini -> sw_fini
Key functions: npu_early_init(), npu_sw_init() (FW loading), npu_hw_init() (mailbox setup)

### amdgpu_npu.h — IP block interface
- Registers NPU as AMDGPU_IP_NPU in the amdgpu IP block enum
- Declares npu_set_ip_blocks() for amdgpu_device initialization

### amdgpu_npu_mgr.c — Unified memory manager integration
- Integrates NPU memory allocations into amdgpu's memory domain system
- BO flags handling for NPU-specific allocation paths
- Most likely touches amdgpu_vm.c, amdgpu_object.c interfaces

### amdgpu_npu_sched.c — NPU scheduling
- Implements amdgpu_ring callbacks for NPU command submission
- Ring insert_nop, emit_ib, emit_fence patterns matching amdgpu_ring convention
- Scheduler integration for concurrent GPU+NPU workload scheduling

### 0001-amdxdna-fix-smu-init-order-strix-halo.patch
Fixes SMU initialization ordering for Strix Halo. Without this, the NPU firmware
can't start because the SMU power domain isn't ready. The patch fixes:
- amdxdna driver probe sequence — waits for SMU before firmware load
- Power gating sequencing for VE2 IPU (different from NPU4/AIE2)

### 0002-add-npu-ip-block.patch
Adds NPU IP block to amdgpu subsystem. Actually applies amdgpu_npu.c, .h, _mgr.c, _sched.c.
Also modifies:
- amdgpu/Makefile — adds amdgpu_npu.o
- amdgpu/amdgpu.h — adds AMDGPU_IP_NPU enum, npu member to amdgpu_device
- amdgpu/amdgpu_device.c — calls npu_set_ip_blocks()

## The IRON API Stack (@iron.jit)

The complete inference pipeline uses these key C++ components:

### xclbins (FPGA overlay bitstreams for NPU kernels)
15 xclbins built:
- 6 BFP16 xclbins: QKV fused (1024x4096), O, GU fused (1024x6144), D, KV — RUNNING IN PRODUCTION
- 4 Multi-token M=256 xclbins: for batched decode — BUILT (needs aiecc fix)
- 4 2-layer batch N=8320 xclbins: for layer pairs — BUILT (needs engine integration)
- 4 INT8 xclbins: QKV, O, GU, D — BUILT (DMA stride needs fix)
- 1 scratch xclbin: for testing

### Core Project Details (from HANDOFF-NPU-OPTIMIZATION.md)
- Project: npu-sandbox/npu-infer (18 xclbin assemblies, ongoing)
- Engine in ~/npu-sandbox/npu-infer/bf16_kernel_dev/
- 6 custom BFP16 xclbins -> 4 GEMMs/layer x 28 layers = 112 NPU calls/token
- Fused QKV (1024x4096) + Fused GU (1024x6144) + O + D projections
- Threaded LM head (4 threads) + Threaded attention (4 threads)
- BFP16 format (hardware-native block float, RMSE 0.0003)
- Weight cache: Q4NX -> dequant -> BFP16 pack -> NPU DMA
- Performance: 210ms/tok (4.8 tok/s), 3.2x over CPU, NPU ~2W

### xclbin Loading Workflow
1. IRON API @iron.jit generates kernel assembly + metadata
2. aiecc (AIE MLIR compiler) lowers to xclbin binary
3. XRT loads xclbin via xrtBO + xclExecBuf
4. DMA descriptors in xclbin control AIE-DMA datamover
5. Host submits command -> doorbell VE2_EVENT_GENERATE_REG = 0x00034008

## 7 Compiler/API Bugs Fixed (from the actual repo)

All documented in HANDOFF-NPU-OPTIMIZATION.md:

1. **ScalarValue nanobind type mismatch** — removed ArithValueMeta metaclass
   - File: iron/src/iron/codegen/python_api/ops.py
   - Symptom: nanobind couldn't bind Python ScalarValue class
   - Fix: remove metaclass, use plain nanobind::class_

2. **AIE ELF symbol rename** — pure-Python ELF32 parser (objcopy can't handle 32-bit AIE ELFs)
   - File: tools/elf_patch.py (custom)
   - Symptom: binutils objcopy fails on 32-bit AIE ELFs
   - Fix: implemented pure-Python ELF32 parser for symbol patching

3. **transpose.hpp incomplete type** — template deduction fallback
   - File: iron/include/iris/transpose.hpp
   - Symptom: template deduction fails for transposed views
   - Fix: explicit template deduction fallback

4. **mm.cc missing extern "C"** — Peano compiler needs C linkage for symbol resolution
   - File: iron/src/peano/mm.cc
   - Symptom: linker fails to resolve symbols in Peano-compiled microkernels
   - Fix: added extern "C" to mm.cc functions

5. **SKIP_VECTORIZED flag** — preprocessor guard for scalar-only kernel compilation
   - File: iron/include/iris/compiler_flags.h
   - Symptom: compiler tries vectorized path on scalar-arch kernels
   - Fix: added #ifdef SKIP_VECTORIZED guard

6. **MLIR parser i8/i16 rejection** — patched AIEXDialect.cpp + AIETargetModel.cpp, rebuilt with ninja
   - Files in aiecc source: lib/Dialect/AIEX/Transforms/AIEXDialect.cpp, lib/Target/AIETargetModel.cpp
   - Symptom: MLIR parser only accepts v8bfp16ebs8, v16bfp16ebs16; rejects i8/i16
   - Fix: added i8/i16 type support in AIEX dialect + target model, rebuilt with ninja

7. **~15 IRON API integration issues** — all fixed, @iron.jit works end-to-end
   - Various IRON API Python/C++ integration points
   - All documented with before/after in HANDOFF

