## NPU Hardware Architecture (VE2-specific)

- XDNA 2: NPU5 (PCI 17f0:11), NOT NPU4/AIE2
- 8 AIE columns, 31 TFLOPS BFP16, 50 TOPS INT8
- VE2 Image Processor Unit (custom dual-issue 16-bit VLIW ISA, not ARM64/RISC-V)
- No SMU mailbox protocol — different from NPU4
- Firmware interface via HSA queue ring buffer + doorbell (VE2_EVENT_GENERATE_REG = 0x00034008)
- BO create/sync/exec through DRM ioctl
- Active firmware: 1.1.2.65 (429KB), Boot firmware: 1.0.0.166 (376KB) at /lib/firmware/amdnpu/17f0_11/
- AIE DMA: multi-dimensional addressing via dimensionsToStream/dimensionsFromStream in MLIR

## Known Issues (The Wall — from the repo)

### INT8 — DMA Strides Wrong
- NPU hardware fully supports INT8 (50 TOPS)
- IRON API INT8 matmul at 64x64x64 produces exact match, error=0
- MLIR parser fixed (bug #6 above) — INT8 xclbins build successfully (66KB each)
- But DMA stride formulas were written for BFP16's 1.125-byte packed format (v8bfp16ebs8)
- INT8 has 1.0-byte element type — DMA descriptors access wrong memory offsets
- The n1_core tile streaming hierarchy produces incorrect DMA dimensions for INT8
- Fixing the MLIR generator's DMA dimension computation should unblock this

### BF16 — DMA Controller Hangs
- BF16 xclbins compile but DMA controller hangs on first kernel call
- Every kernel variant (identity copy, native matmul, emulated matmul) hangs identically
- Chess compiler generates incorrect DMA descriptors for bfloat16 memory types
- Windows handles BF16 correctly through DirectML/QNN — different NPU stack
- Root cause: aiecc/Chess toolchain bug in bfloat16 DMA descriptor generation

### IOMMU Faults (Crash History)
- Multi-context XRT tests can cause IOMMU page faults
- IOMMU faults corrupt PSP state shared between GPU and NPU
- PSP shared between GPU and NPU is single point of failure
- Serialization gate patch may help by allowing proper cleanup on context switch
- Crashes NOT caused by firmware patching (never deployed on this system)

