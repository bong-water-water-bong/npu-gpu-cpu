## Per-PR Review Checklist

### KERNEL CORRECTNESS (CRITICAL)
- [ ] copy_from_user / copy_to_user bounds-checked (no buffer overflows)
- [ ] locked_vm / rlimit accounting correct for NPU memory allocations
- [ ] No race conditions in NPU/GPU shared state without proper locking
- [ ] MMU notifier / reverse mapping correct for NPU pages
- [ ] DMA buffer export/import (dma-buf) handles all error paths
- [ ] PCI BAR access validated (no out-of-bounds register access)
- [ ] Module reference counting correct (try_module_get/module_put)
- [ ] No sleeping in atomic context (spinlock vs mutex correctly used)
- [ ] Memory barriers correct for MMIO register writes
- [ ] amdgpu_npu.c lifecycle functions match amdgpu IP block convention (early_init -> sw_init -> hw_init)
- [ ] amdgpu_ring callbacks in npu_sched.c follow amdgpu ring ABI (insert_nop, emit_ib, emit_fence)

### MEMORY SAFETY (KERNEL + C++)
- [ ] Raw pointer arithmetic bounds-checked (no buffer overflow)
- [ ] DMA buffer management handles allocation failure
- [ ] ioctl argument validation (no user-controlled sizes without checks)
- [ ] C++ RAII used correctly (no raw new/delete in new code)
- [ ] No use-after-free in NPU context teardown
- [ ] GPU<->NPU shared memory sync points correct (dma_fence)
- [ ] hip_npu_memory.cpp: std::mutex g_buf_mutex scope correct (no deadlock)
- [ ] NPUBuffer map entries cleaned up on error paths (not just success)

### BUILD CORRECTNESS
- [ ] Makefile changes correct for kernel module build
- [ ] Kernel module dependencies listed (amdxdna, amdgpu deps)
- [ ] CMake changes in rocm-npu/ correct
- [ ] Platform guards for x86_64 only (ARM-specific code would be wrong)
- [ ] CONFIG checks for kernel features (DMA_SHARED_BUFFER, HSA_AMD)
- [ ] XRT/flm dev libraries available for test builds that depend on them
- [ ] libhip_npu.so SONAME/versioning correct if library ABI changed
- [ ] Makefile targets consistent with actual binaries (test_*.cpp present but may not be in TEST_SRCS)

### NPU SPECIFIC
- [ ] VE2-specific paths correct (NOT legacy NPU4 SMU protocol)
- [ ] AIE column count (8 for Strix Halo) not hardcoded — use config or detect
- [ ] xclbin loading path correct (XRT or raw DRM ioctl)
- [ ] BO (buffer object) create/sync/exec correctly handled
- [ ] DMA doorbell address VE2_EVENT_GENERATE_REG = 0x00034008 correct
- [ ] HSA queue semantics (not SMU mailbox) — waiting on ring, not polling mbox
- [ ] BFP16 vs INT8 format handling correct (packing, stride computation)
- [ ] Firmware version check for 1.1.2.65 vs 1.0.0.166 if FW API changed

### IRON API / XCLBIN INTEGRATION
- [ ] xclbin descriptor format matches AIE DMA dimensions (dimensionsToStream / dimensionsFromStream)
- [ ] DMA stride computation correct for element type (BFP16 1.125B vs INT8 1.0B vs FP16 2.0B)
- [ ] IRON API @iron.jit decorator usage correct (no breaking changes to IRON API)
- [ ] Any new xclbins follow the 6-production-xclbin pattern (QKV fused, O, GU fused, D, KV)
